<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YOKAIS DIVISION KOPION — Base de Datos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#050508;color:#e8e4dc;-webkit-font-smoothing:antialiased;min-height:100vh}
.hdr{position:sticky;top:0;z-index:20;padding:14px 20px;background:#050508;border-bottom:1px solid rgba(180,0,0,0.03);display:flex;align-items:center;gap:12px}
.hdr a{font-family:'Black Ops One',cursive;font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:rgba(180,0,0,0.15);text-decoration:none}
.hdr a:hover{color:#b40000}
.hdr h1{font-family:'Black Ops One',cursive;font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;flex:1}

/* TABS */
.tabs{display:flex;gap:2px;background:#050508;border-bottom:1px solid rgba(255,255,255,0.02);position:sticky;top:52px;z-index:19}
.tabs button{flex:1;padding:10px 16px;border:none;background:transparent;font-family:'Black Ops One',cursive;font-size:0.55rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent}
.tabs button:nth-child(1){color:rgba(74,222,128,0.4)}
.tabs button:nth-child(1):hover,.tabs button:nth-child(1).on{color:#4ade80;border-bottom-color:#4ade80}
.tabs button:nth-child(2){color:rgba(212,168,76,0.4)}
.tabs button:nth-child(2):hover,.tabs button:nth-child(2).on{color:#d4a84c;border-bottom-color:#d4a84c}
.tabs button:nth-child(3){color:rgba(232,228,220,0.3)}
.tabs button:nth-child(3):hover,.tabs button:nth-child(3).on{color:#fff;border-bottom-color:#fff}

.wrap{padding:16px 20px;max-width:1100px;margin:0 auto}
.tab{display:none}.tab.on{display:block}

/* FILTERS */
.fl{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.fl button{font-size:0.45rem;padding:3px 10px;background:rgba(0,0,0,0.2);border:1px solid transparent;border-radius:3px;color:rgba(255,255,255,0.05);cursor:pointer;font-family:Inter,sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
.fl button:hover{color:rgba(255,255,255,0.1)}
.fl button.on{color:currentColor;border-color:currentColor}

.card{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.02);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all 0.3s}
.card:hover{transform:translateY(-2px)}
.card h4{font-size:0.68rem;font-weight:600;margin-bottom:3px}
.card .m{font-size:0.45rem;color:rgba(255,255,255,0.04);text-transform:uppercase;letter-spacing:1px}
.card .g{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin:3px 0}
.card .g div{text-align:center;padding:2px;background:rgba(0,0,0,0.2);border-radius:2px}
.card .g .nv{font-size:0.5rem;font-weight:600}
.card .g .lb{font-size:0.38rem;color:rgba(255,255,255,0.04);text-transform:uppercase}

/* DETAIL PANEL */
.det{position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;background:rgba(5,5,8,0.95);display:none;overflow-y:auto;padding:60px 20px 30px}
.det.on{display:block}
.det .bk{position:fixed;top:12px;right:20px;font-size:0.5rem;color:rgba(255,255,255,0.05);cursor:pointer;background:none;border:1px solid rgba(255,255,255,0.02);padding:6px 14px;border-radius:3px;font-family:Inter,sans-serif;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s}
.det .bk:hover{color:rgba(255,255,255,0.15)}
.det h2{font-family:'Black Ops One',cursive;font-size:1.2rem;letter-spacing:2px;margin-bottom:16px}
.det .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px}
.det .sg .lc{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.02);border-radius:5px;padding:10px 12px}
.det .sg .lc h4{font-size:0.6rem;font-weight:600;margin-bottom:2px}
.det .sg .lc .s{font-size:0.45rem;color:rgba(255,255,255,0.04);text-transform:uppercase;letter-spacing:1px}
.det .info{font-size:0.55rem;color:rgba(255,255,255,0.04);line-height:1.5;margin-bottom:12px}

/* MINING THEME */
.tab-mining .card{border-color:rgba(74,222,128,0.03)}.tab-mining .card:hover{border-color:rgba(74,222,128,0.08);background:rgba(74,222,128,0.01)}
.tab-mining .card .g .nv{color:rgba(74,222,128,0.5)}
.tab-mining .fl button.on{color:#4ade80}
.det-mining h2{color:#4ade80}
.det-mining .sg .lc{background:rgba(74,222,128,0.01);border-color:rgba(74,222,128,0.03)}
.det-mining .sg .lc h4{color:rgba(74,222,128,0.15)}
.det-mining .sg .lc .s{color:rgba(74,222,128,0.05)}

/* MISSIONS THEME */
.tab-mission .card{border-color:rgba(212,168,76,0.03)}.tab-mission .card:hover{border-color:rgba(212,168,76,0.08);background:rgba(212,168,76,0.01)}
.tab-mission .fl button.on{color:#d4a84c}

/* BLUEPRINT THEME */
.tab-bp .card{border-color:rgba(232,228,220,0.02)}.tab-bp .card:hover{border-color:rgba(232,228,220,0.05);background:rgba(232,228,220,0.005)}
.tab-bp .fl button.on{color:#fff}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(180,0,0,0.06);border-radius:2px}
@media(max-width:600px){
  .tabs button{font-size:0.45rem;letter-spacing:2px;padding:8px 10px}
  .det .sg{grid-template-columns:1fr}
}
</style>
</head>

<div class="tab tab-bp" id="tab-bp">

</div>

<div class="det" id="detailPanel">

// ===== MINING =====
var miningFilter = '';

function buildMining(){
  var g=document.getElementById('miningGrid');
  g.innerHTML='';
  var e=DATA.elements;
  for(var k in e){
    if(miningFilter && k.toLowerCase().indexOf(miningFilter.toLowerCase())===-1)continue;
    var v=e[k];var m=method(k);
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4>'+k+' <span style="font-size:0.42rem;color:rgba(74,222,128,0.15);letter-spacing:1px">'+m+'</span></h4>'+
      '<div class="g"><div><div class="nv">'+fmt(v.i)+'</div><div class="lb">Inest</div></div>'+
      '<div><div class="nv">'+fmt(v.d)+'</div><div class="lb">Dens</div></div>'+
      '<div><div class="nv">'+fmt(v.e)+'</div><div class="lb">Exp</div></div></div>';
    d.onclick=function(n){return function(){showMineralDetail(n)}}(k);
    g.appendChild(d);
  }
}

function showMineralDetail(name){
  var d=document.getElementById('detailContent');
  var html='<h2 style="color:#4ade80">'+name+'</h2><div class="info">';
  var v=DATA.elements[name];
  html+='<b>Densidad:</b> '+v.d+' | <b>Inestabilidad:</b> '+fmt(v.i)+' | <b>Resistencia:</b> '+v.r+' | <b>Ventana optima:</b> '+v.o+' | <b>Explosion:</b> '+fmt(v.e)+'<br><b>Metodo:</b> '+method(name)+'</div>';
  
  var locs=DATA.mineralLocs[name];
  if(locs){
    html+='<div style="margin-top:12px"><b>Aparece en ('+locs.length+' ubicaciones):</b></div><div class="sg">';
    locs.forEach(function(l){
      html+='<div class="lc"><h4>'+l.name+'</h4><div class="s">'+l.system+' \u00b7 '+l.type+'</div></div>';
    });
    html+='</div>';
  }else{
    html+='<div style="margin-top:12px;color:rgba(74,222,128,0.04)">Sin ubicaciones registradas</div>';
  }
  d.innerHTML=html;
  d.parentElement.className='det det-mining on';
}

    if(missionFilter && m.n.toLowerCase().indexOf(missionFilter.toLowerCase())===-1)return;
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4 style="color:#d4a84c">'+m.n+'</h4><div class="m">'+m.f+' \u2022 '+m.s+' \u2022 '+(m.il?'ILEGAL':'LEGAL')+'</div>'+
      '<div class="g"><div><div class="nv" style="color:rgba(74,222,128,0.3)">'+fmt(m.r)+'</div><div class="lb">aUEC</div></div>'+
      '<div><div class="nv">'+m.xp+'</div><div class="lb">XP</div></div>'+
      '<div><div class="nv">'+m.t+'</div><div class="lb">Tipo</div></div></div>';
    d.onclick=(function(mm){return function(){alert('Mision: '+mm.n+'\nFaccion: '+mm.f+'\nSistema: '+mm.s+'\nRecompensa: '+fmt(mm.r)+' aUEC\nXP Base: '+mm.xp+'\nTipo: '+mm.t+(mm.il?'\nILEGAL':'')+'');}})(m);
    g.appendChild(d);
  });
}

// ===== BLUEPRINTS =====
var bpFilter='';
var bps = DATA.craftingItems.filter(function(c){return c.name.length<40}).slice(0,24).map(function(c,i){
  var cat='Arma / Componente';
  if(i<8)cat='Componente Nave';
  else if(i<16)cat='Armadura FPS';
  return {n:c.name, c:cat, cls:'Clase A-D', g:'Grado A-D', s:'Tam 0-6'};
});


function buildBPs(){
  var g=document.getElementById('bpGrid');
  g.innerHTML='';
  bps.forEach(function(b){
    if(bpFilter && b.n.toLowerCase().indexOf(bpFilter.toLowerCase())===-1)return;
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4 style="color:#e8e4dc">'+b.n+'</h4><div class="m">'+b.c+'</div><div class="g"><div><div class="nv">'+b.cls.split('/').slice(0,2).join('/')+'</div><div class="lb">Clases</div></div><div><div class="nv">'+b.g+'</div><div class="lb">Grado</div></div><div><div class="nv">S'+b.s+'</div><div class="lb">Tam</div></div></div>';
    d.onclick=(function(bb){return function(){var txt='Blueprint: '+bb.n+'\nCategoria: '+bb.c+'\nClases: '+bb.cls+'\nGrados: '+bb.g+'\nTamaños: '+bb.s;alert(txt);}})(b);
    g.appendChild(d);
  });
}

function switchTab(id){
  document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
  event.target.classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
}

function closeDetail(){
  document.getElementById('detailPanel').className='det';
}

buildMining();
buildMissions();
buildBPs();
</script>
</body>
</html>
