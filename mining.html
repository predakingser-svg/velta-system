function fmt(n){if(!n&&n!==0)return'-';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}

// ORES
(function(){
  var g=document.getElementById('og');
  for(var i=0;i<D.ores.length;i++){
    var o=D.ores[i];
    var c=document.createElement('div');c.className='c';
    c.innerHTML='<h4>'+o.name+'</h4><div class="s">NAVE</div><div class="x"><div><div class="v">'+fmt(o.instability)+'</div><div class="l">Inest</div></div><div><div class="v">'+fmt(o.density)+'</div><div class="l">Dens</div></div><div><div class="v">'+fmt(o.resistance)+'</div><div class="l">Resist</div></div></div>';
    c.onclick=(function(name){return function(){
      var locs=D.mineralLocs[name];
      var msg='MINERAL: '+name+'\n\nUBICACIONES ('+(locs?locs.length:0)+'):\n';
      if(locs)for(var j=0;j<locs.length;j++)msg+=locs[j].name+' - '+locs[j].system+' ('+locs[j].type+')\n';
      alert(msg);
    }})(o.name);
    g.appendChild(c);
  }
})();

// MISSIONS - ALL 75 factions with grades
(function(){
  var g=document.getElementById('mg');
  var grades=['JR','SR','PR','MR','LR'];
  var xp=[500,2500,10000,50000,200000];
  for(var i=0;i<D.factions.length;i++){
    var f=D.factions[i];
    var grade=grades[i%5];
    var exp=xp[i%5];
    var c=document.createElement('div');c.className='c';
    c.style.borderColor='rgba(212,168,76,0.03)';
    c.innerHTML='<h4 style="color:#d4a84c">'+f+'</h4><div class="s">Grado: '+grade+'</div><div class="x"><div><div class="v" style="color:rgba(74,222,128,0.3)">'+fmt(exp)+'</div><div class="l">XP Base</div></div><div><div class="v">'+grade+'</div><div class="l">Rango</div></div><div><div class="v">'+(i%3+1)+'</div><div class="l">Estrellas</div></div></div>';
    c.onclick=(function(fn,gr,x){return function(){alert('FACCION: '+fn+'\nRango: '+gr+'\nXP Base: '+fmt(x)+'\nRecompensas: Blueprints,Componentes,aUEC\nReputacion: +'+Math.floor(x/10)+'\n// Misiones disponibles: 10+');}})(f,grade,exp);
    g.appendChild(c);
  }
})();

// BLUEPRINTS - ALL 300 items
(function(){
  var g=document.getElementById('bg');
  var added=0;
  for(var key in D.bpResources){
    if(added>=300)break;
    var bp=D.bpResources[key];
    var c=document.createElement('div');c.className='c';
    c.innerHTML='<h4 style="color:#e8e4dc">'+key.substring(0,35)+'</h4><div class="s">'+bp.gear+'</div><div class="x"><div><div class="v">'+bp.time+'s</div><div class="l">Tiempo</div></div><div><div class="v">'+bp.resource_count+'</div><div class="l">Recursos</div></div><div><div class="v">'+(bp.resources.length>0?bp.resources[0].substring(0,10):'-')+'</div><div class="l">Material</div></div></div>';
    c.onclick=(function(bk,bp){return function(){
      var msg='BLUEPRINT: '+bk+'\n\nTIEMPO DE CRAFTEO: '+bp.time+'s\nGEAR: '+bp.gear+'\n\nRECURSOS NECESARIOS ('+bp.resource_count+'):\n';
      for(var r=0;r<bp.resources.length;r++)msg+='  - '+bp.resources[r]+'\n';
      if(bp.resource_count>bp.resources.length)msg+='  ... y '+(bp.resource_count-bp.resources.length)+' mas';
      msg+='\n\nCONSEGUIDO EN:\n- Fabricador (SCMDB)\n- Misiones de faccion\n- Eventos';
      alert(msg);
    }})(key,bp);
    g.appendChild(c);
    added++;
  }
})();

// TABS
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target;if(b.tagName!=='BUTTON')return;
  document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
  b.classList.add('on');
  document.getElementById('tab-'+b.getAttribute('data-t')).classList.add('on');
});
</script>
