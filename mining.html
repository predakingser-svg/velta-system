function fmt(n){if(!n&&n!==0)return'—';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function gm(n){var f=['Hadanite','Dolivine','Aphorite','Janalite','Jaclium','Saldynium','Carinite','Carinitepure'];var r=['Glacosite','Beradom','Feynmaline'];if(f.indexOf(n)!==-1)return'FPS';if(r.indexOf(n)!==-1)return'ROC';return'SHIP'}
function gl(n){var r=[];for(var k in DATA.locations){var loc=DATA.locations[k];for(var i=0;i<loc.m.length;i++){if(loc.m[i].toLowerCase().indexOf(n.toLowerCase())!==-1){r.push(k);break}}}return r.length?'<span style="color:rgba(74,222,128,0.06)">'+r.slice(0,3).join(', ')+(r.length>3?', +'+(r.length-3)+' mas':''):'<span style="color:rgba(74,222,128,0.04)">Sin ubicacion fija';}

function rm(){var g=document.getElementById('mineralGrid');g.innerHTML='';for(var k in DATA.elements){var v=DATA.elements[k];var m=gm(k);var d=document.createElement('div');d.className='card';d.innerHTML='<h4>'+k+' <span style="font-size:0.42rem;color:rgba(74,222,128,0.15);letter-spacing:1px">'+m+'</span></h4><div class="g"><div><div class="nv">'+fmt(v.i)+'</div><div class="lb">Inest</div></div><div><div class="nv">'+fmt(v.d)+'</div><div class="lb">Dens</div></div><div><div class="nv">'+fmt(v.e)+'</div><div class="lb">Exp</div></div></div><div class="loc">'+gl(k)+'</div>';g.appendChild(d);}}

function rl(){var g=document.getElementById('locGrid');g.innerHTML='';for(var k in DATA.locations){var loc=DATA.locations[k];var d=document.createElement('div');d.className='card';d.innerHTML='<h4>'+k+'</h4><div class="g" style="grid-template-columns:1fr 1fr"><div><div class="nv" style="font-size:0.48rem">'+loc.s+'</div><div class="lb">Sistema</div></div><div><div class="nv" style="font-size:0.48rem">'+loc.t+'</div><div class="lb">Tipo</div></div></div><div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">'+loc.m.map(function(x){return'<span style="font-size:0.4rem;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,0.2);color:rgba(74,222,128,0.05)">'+x+'</span>'}).join('')+'</div>';g.appendChild(d);}}

function rr(){var g=document.getElementById('refGrid');g.innerHTML='';for(var i=0;i<DATA.refineries.length;i++){var rf=DATA.refineries[i];var d=document.createElement('div');d.className='card';var b=Object.keys(rf.b).sort(function(a,b){return rf.b[b]-rf.b[a]}).slice(0,8);d.innerHTML='<h4>'+rf.n+'</h4><div style="font-size:0.45rem;color:rgba(74,222,128,0.08);margin-bottom:2px">'+rf.s+'</div><div style="font-size:0.48rem;color:rgba(74,222,128,0.06);line-height:1.3">'+b.map(function(k){var v=rf.b[k];return'<span style="color:'+(v>0?'rgba(74,222,128,0.2)':'rgba(180,0,0,0.2)')+'">'+(v>0?'+':'')+v+'%</span> '+k.replace(' (Ore)','').replace(' (Raw)','')}).join(' ')+'</div>';g.appendChild(d);}}

function showSub(id,btn){document.querySelectorAll('.submenu button').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');document.getElementById('view-minerales').style.display=id==='minerales'?'block':'none';document.getElementById('view-ubicaciones').style.display=id==='ubicaciones'?'block':'none';document.getElementById('view-refinerias').style.display=id==='refinerias'?'block':'none';}
