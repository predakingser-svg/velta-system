<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#050508;color:#e8e4dc;overflow:hidden;height:100vh;width:100vw;position:relative}

/* === FANGS SVG === */
.fang{position:fixed;z-index:2;pointer-events:none;opacity:0.08}
.fang-l{top:-10px;left:5%;width:120px;height:160px}
.fang-r{top:-10px;right:5%;width:120px;height:160px;transform:scaleX(-1)}
.fang-bl{bottom:60px;left:3%;width:80px;height:110px;opacity:0.05}
.fang-br{bottom:60px;right:3%;width:80px;height:110px;transform:scaleX(-1);opacity:0.05}

/* === GLITCH OVERLAY === */
.glitch-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none}
.glitch-overlay::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(74,222,128,0.08) 2px,rgba(74,222,128,0.08) 4px);animation:scanL 2s linear infinite;opacity:0.5}
.glitch-overlay::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(255,0,0,0.04) 4px,rgba(255,0,0,0.04) 8px);animation:scanR 3s linear infinite reverse;opacity:0.3}
@keyframes scanL{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes scanR{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* RANDOM GLITCH FLASHES */
@keyframes flash{0%,90%,100%{opacity:0}92%{opacity:0.15}94%{opacity:0}96%{opacity:0.08}98%{opacity:0}}
.glitch-flash{position:fixed;inset:0;z-index:9998;pointer-events:none;background:rgba(180,0,0,0.1);animation:flash 4s ease-in-out infinite}
.glitch-flash2{position:fixed;inset:0;z-index:9998;pointer-events:none;background:rgba(0,255,0,0.05);animation:flash 6s ease-in-out infinite 1s}

/* === TITLE GLITCH === */
@keyframes glitch1{0%,100%{transform:translate(0)}2%{transform:translate(-3px,2px)}4%{transform:translate(3px,-2px)}6%{transform:translate(-1px,1px)}8%{transform:translate(0)}10%{transform:translate(2px,-1px)}12%{transform:translate(0)}}
@keyframes glitch2{0%,100%{transform:translate(0)}3%{transform:translate(4px,-1px);opacity:0.6}5%{transform:translate(-4px,2px);opacity:0.4}7%{transform:translate(0)}9%{transform:translate(2px,-3px)}11%{transform:translate(0)}14%{transform:translate(-2px,1px);opacity:0.7}16%{transform:translate(0)}}
@keyframes flick{0%,90%,100%{opacity:1}92%{opacity:0}94%{opacity:1}97%{opacity:0.3}99%{opacity:1}}

.main-page{position:fixed;inset:0 0 60px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;background:radial-gradient(ellipse at center,rgba(180,0,0,0.03),transparent 70%)}
.main-page h1{font-family:'Black Ops One',cursive;font-size:5rem;letter-spacing:6px;text-transform:uppercase;text-align:center;line-height:1;background:linear-gradient(180deg,#e8e4dc 20%,#b40000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch1 2s ease-in-out infinite;position:relative;filter:drop-shadow(0 0 30px rgba(180,0,0,0.1))}
.main-page h1::before{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(0,255,0,0.3) 20%,rgba(180,0,0,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch2 3s ease-in-out infinite;opacity:0.5;clip-path:inset(20% 0 60% 0)}
.main-page h1::after{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(255,0,0,0.3) 20%,rgba(0,0,255,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch1 2.5s ease-in-out infinite reverse;opacity:0.4;clip-path:inset(60% 0 20% 0)}
.main-page .sub{font-size:0.6rem;color:rgba(180,0,0,0.2);letter-spacing:10px;text-transform:uppercase;margin-top:24px;animation:flick 2s infinite}

/* === MENU === */
.menu{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:10;height:60px}
.menu button{flex:1;border:none;font-family:'Black Ops One',cursive;font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border-top:1px solid;border-left:none;border-right:none;border-bottom:none}
.menu button:nth-child(1){background:#050508;color:rgba(74,222,128,0.5);border-top-color:rgba(74,222,128,0.1)}
.menu button:nth-child(1):hover,.menu button:nth-child(1).on{color:#4ade80;border-top-color:#4ade80;text-shadow:0 0 20px rgba(74,222,128,0.1)}
.menu button:nth-child(2){background:#050508;color:rgba(212,168,76,0.5);border-top-color:rgba(212,168,76,0.1)}
.menu button:nth-child(2):hover,.menu button:nth-child(2).on{color:#d4a84c;border-top-color:#d4a84c;text-shadow:0 0 20px rgba(212,168,76,0.1)}
.menu button:nth-child(3){background:#050508;color:rgba(232,228,220,0.3);border-top-color:rgba(232,228,220,0.05)}
.menu button:nth-child(3):hover,.menu button:nth-child(3).on{color:#fff;border-top-color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.1)}

/* === PANELS === */
.panel{position:fixed;top:0;left:0;right:0;bottom:60px;z-index:5;overflow-y:auto;display:none;padding:20px}
.panel.on{display:block}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:rgba(180,0,0,0.1);border-radius:2px}

.panel.mining{background:#050508}
.panel.mining .h2{font-family:'Black Ops One',cursive;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:#4ade80;margin-bottom:10px}
.panel.mining .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:5px;margin-bottom:16px}
.panel.mining .card{background:rgba(74,222,128,0.01);border:1px solid rgba(74,222,128,0.03);border-radius:6px;padding:10px 12px;transition:all 0.3s}
.panel.mining .card:hover{background:rgba(74,222,128,0.02);border-color:rgba(74,222,128,0.06)}
.panel.mining .card h4{font-size:0.68rem;font-weight:600;margin-bottom:3px}
.panel.mining .card .v{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin:3px 0}
.panel.mining .card .v div{text-align:center;padding:2px;background:rgba(0,0,0,0.2);border-radius:2px}
.panel.mining .card .v .nv{font-size:0.52rem;font-weight:600;color:rgba(74,222,128,0.6)}
.panel.mining .card .v .nv.h{color:#b40000}
.panel.mining .card .v .lb{font-size:0.38rem;color:rgba(74,222,128,0.05);text-transform:uppercase}
.panel.mining .card .loc{font-size:0.48rem;color:rgba(74,222,128,0.06);margin-top:3px;line-height:1.3}

.panel.mining .submenu{display:flex;gap:2px;margin-bottom:10px}
.panel.mining .submenu button{font-size:0.48rem;padding:4px 10px;background:transparent;border:1px solid rgba(74,222,128,0.03);border-radius:3px;color:rgba(74,222,128,0.06);cursor:pointer;font-family:Inter,sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
.panel.mining .submenu button:hover{color:rgba(74,222,128,0.12)}
.panel.mining .submenu button.on{color:#4ade80;border-color:rgba(74,222,128,0.08)}

.panel.mission{background:#050508}
.panel.mission .h2{font-family:'Black Ops One',cursive;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:#d4a84c;margin-bottom:10px}
.panel.mission p{font-size:0.65rem;color:rgba(212,168,76,0.04);letter-spacing:2px;text-transform:uppercase;font-family:'Black Ops One',cursive;text-align:center;padding:60px 20px}

.panel.blueprint{background:#050508}
.panel.blueprint .h2{font-family:'Black Ops One',cursive;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:#e8e4dc;margin-bottom:10px}
.panel.blueprint p{font-size:0.65rem;color:rgba(232,228,220,0.02);letter-spacing:2px;text-transform:uppercase;font-family:'Black Ops One',cursive;text-align:center;padding:60px 20px}

@media(max-width:600px){
  .main-page h1{font-size:2.5rem;letter-spacing:3px}
  .menu button{font-size:0.55rem;letter-spacing:2px}
  .panel.mining .cg{grid-template-columns:1fr}
  .fang{display:none}
}
</style>
</head>

function fmt(n){if(!n&&n!==0)return'\u2014';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function gm(n){var f=['Hadanite','Dolivine','Aphorite','Janalite','Jaclium','Saldynium','Carinite','Carinitepure'];var r=['Glacosite','Beradom','Feynmaline'];if(f.indexOf(n)!==-1)return'FPS';if(r.indexOf(n)!==-1)return'ROC';return'SHIP'}

function gl(n){
  var r=[];
  for(var k in DATA.locations){
    var loc=DATA.locations[k];
    for(var i=0;i<loc.m.length;i++){if(loc.m[i].toLowerCase().indexOf(n.toLowerCase())!==-1){r.push(k);break}}
  }
  return r.length?'<span style="color:rgba(74,222,128,0.06)">'+r.slice(0,3).join(', ')+(r.length>3?', +'+(r.length-3)+' mas':''):'<span style="color:rgba(74,222,128,0.04)">Sin ubicacion fija';
}

function rm(){
  var g=document.getElementById('mineralGrid');
  g.innerHTML='';
  for(var k in DATA.elements){
    var v=DATA.elements[k];var m=gm(k);
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4>'+k+' <span style="font-size:0.42rem;color:rgba(74,222,128,0.15);letter-spacing:1px">'+m+'</span></h4>'+
      '<div class="v"><div><div class="nv">'+fmt(v.i)+'</div><div class="lb">Inest</div></div>'+
      '<div><div class="nv">'+fmt(v.d)+'</div><div class="lb">Dens</div></div>'+
      '<div><div class="nv">'+fmt(v.e)+'</div><div class="lb">Exp</div></div></div>'+
      '<div class="loc">'+gl(k)+'</div>';
    g.appendChild(d);
  }
}

function rl(){
  var g=document.getElementById('locGrid');
  g.innerHTML='';
  for(var k in DATA.locations){
    var loc=DATA.locations[k];
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4>'+k+'</h4><div class="v" style="grid-template-columns: 1fr 1fr;margin-bottom:4px"><div><div class="nv" style="font-size:0.48rem">'+loc.s+'</div><div class="lb">Sistema</div></div><div><div class="nv" style="font-size:0.48rem">'+loc.t+'</div><div class="lb">Tipo</div></div></div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:2px">'+loc.m.map(function(x){return'<span style="font-size:0.42rem;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,0.2);color:rgba(74,222,128,0.05)">'+x+'</span>'}).join('')+'</div>';
    g.appendChild(d);
  }
}

function rr(){
  var g=document.getElementById('refGrid');
  g.innerHTML='';
  for(var i=0;i<DATA.refineries.length;i++){
    var rf=DATA.refineries[i];
    var d=document.createElement('div');d.className='card';
    var b=Object.keys(rf.b).sort(function(a,b){return rf.b[b]-rf.b[a]}).slice(0,8);
    d.innerHTML='<h4>'+rf.n+'</h4><div style="font-size:0.45rem;color:rgba(74,222,128,0.08);margin-bottom:2px">'+rf.s+'</div>'+
      '<div style="font-size:0.48rem;color:rgba(74,222,128,0.06);line-height:1.3">'+b.map(function(k){var v=rf.b[k];return'<span style="color:'+(v>0?'rgba(74,222,128,0.2)':'rgba(180,0,0,0.2)')+'">'+(v>0?'+':'')+v+'%</span> '+k.replace(' (Ore)','').replace(' (Raw)','')}).join(' ')+'</div>';
    g.appendChild(d);
  }
}

function openPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.menu button').forEach(function(b){b.classList.remove('on')});
  document.getElementById('panel-'+id).classList.add('on');
  event.target.classList.add('on');
}

function showSub(id,btn){
  document.querySelectorAll('#panel-mining .submenu button').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.getElementById('minerales-view').style.display=id==='minerales'?'block':'none';
  document.getElementById('ubicaciones-view').style.display=id==='ubicaciones'?'block':'none';
  document.getElementById('refinerias-view').style.display=id==='refinerias'?'block':'none';
}
