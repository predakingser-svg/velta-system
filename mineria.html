<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YOKAIS DIVISION KOPION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#050508;color:#e8e4dc;overflow:hidden;height:100vh;width:100vw;position:relative}

/* GLITCH OVERLAY */
.g-overlay{position:fixed;inset:0;z-index:3;pointer-events:none}
.g-overlay::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(74,222,128,0.06) 2px,rgba(74,222,128,0.06) 4px);animation:sc1 3s linear infinite}
.g-overlay::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,0,0,0.04) 3px,rgba(255,0,0,0.04) 6px);animation:sc2 4s linear infinite reverse}
@keyframes sc1{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes sc2{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.g-flash{position:fixed;inset:0;z-index:2;pointer-events:none;animation:fk 5s infinite}
@keyframes fk{0%,85%,100%{opacity:0}87%{opacity:0.12;background:rgba(180,0,0,0.08)}89%{opacity:0}91%{opacity:0.06;background:rgba(0,255,0,0.04)}93%{opacity:0}}

/* FANGS */
.fang{position:fixed;z-index:1;pointer-events:none}
.f1{top:-10px;left:5%;font-size:80px;color:rgba(180,0,0,0.06)}
.f2{top:-10px;right:5%;font-size:80px;color:rgba(180,0,0,0.06);transform:scaleX(-1)}
.f3{bottom:80px;left:2%;font-size:50px;color:rgba(180,0,0,0.04)}
.f4{bottom:80px;right:2%;font-size:50px;color:rgba(180,0,0,0.04);transform:scaleX(-1)}

/* MAIN PAGE */
.main{position:fixed;inset:0 0 70px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;background:radial-gradient(ellipse at center,rgba(180,0,0,0.03) 0%,transparent 70%)}
.main h1{font-family:'Black Ops One',cursive;font-size:5rem;letter-spacing:8px;text-transform:uppercase;text-align:center;line-height:1.05;background:linear-gradient(180deg,#e8e4dc 20%,#b40000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;animation:gT 2s ease-in-out infinite}
.main h1::before{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(0,255,0,0.3) 20%,rgba(180,0,0,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gT2 3s ease-in-out infinite;opacity:0.4;clip-path:inset(20% 0 60% 0)}
.main h1::after{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(255,0,0,0.3) 20%,rgba(0,0,255,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gT1 2.5s ease-in-out infinite reverse;opacity:0.3;clip-path:inset(60% 0 20% 0)}
@keyframes gT{0%,100%{transform:translate(0)}2%{transform:translate(-2px,1px)}4%{transform:translate(2px,-1px)}6%{transform:translate(0)}8%{transform:translate(-1px,2px)}10%{transform:translate(0)}}
@keyframes gT1{0%,100%{transform:translate(0)}3%{transform:translate(3px,-1px)}5%{transform:translate(-3px,2px)}7%{transform:translate(0)}9%{transform:translate(2px,-2px)}11%{transform:translate(0)}}
@keyframes gT2{0%,100%{transform:translate(0)}4%{transform:translate(-3px,1px);opacity:0.6}6%{transform:translate(3px,-2px);opacity:0.4}8%{transform:translate(0)}}

.main .sub{font-size:0.55rem;color:rgba(180,0,0,0.08);letter-spacing:12px;text-transform:uppercase;margin-top:20px;animation:fk 2s infinite}

/* MENU */
.menu{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:10;height:70px;border-top:1px solid rgba(180,0,0,0.03)}
.menu a{flex:1;display:flex;align-items:center;justify-content:center;text-decoration:none;font-family:'Black Ops One',cursive;font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;transition:all 0.3s;position:relative}
.menu a:nth-child(1){background:#050508;color:rgba(74,222,128,0.5)}
.menu a:nth-child(1):hover{color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,0.2)}
.menu a:nth-child(2){background:#050508;color:rgba(212,168,76,0.5)}
.menu a:nth-child(2):hover{color:#d4a84c;text-shadow:0 0 30px rgba(212,168,76,0.2)}
.menu a:nth-child(3){background:#050508;color:rgba(232,228,220,0.3)}
.menu a:nth-child(3):hover{color:#fff;text-shadow:0 0 30px rgba(255,255,255,0.15)}
.menu a::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;background:currentColor;opacity:0;transition:opacity 0.3s}
.menu a:hover::before{opacity:0.3}

@media(max-width:600px){
  .main h1{font-size:2.5rem;letter-spacing:4px}
  .menu a{font-size:0.5rem;letter-spacing:2px}
  .fang{display:none}
}
</style>
</head>
<body>

<div class="g-overlay"></div>
<div class="g-flash"></div>

<div class="fang f1">\u2b20</div>
<div class="fang f2">\u2b20</div>
<div class="fang f3">\u2b20</div>
<div class="fang f4">\u2b20</div>

<div class="main">
  <h1>YOKAIS<br>DIVISION<br>KOPION</h1>
  <div class="sub">Star Citizen Database</div>
</div>

<div class="menu">
  <a href="mining.html">MINERA</a>
  <a href="misiones.html">MISIONES</a>
  <a href="blueprints.html">BLUEPRINTS</a>
</div>

</body>
</html>
