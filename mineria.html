<html lang="es">
<head>
<meta charset="UTF-8">

<title>YOKAIS DIVISION KOPION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#050508;color:#e8e4dc;overflow:hidden;height:100vh;width:100vw}

/* GLITCH OVERLAY */
.glitch-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.03}
.glitch-overlay::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.03) 2px,rgba(0,255,0,0.03) 4px);animation:scan 3s linear infinite}
.glitch-overlay::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,0,0,0.02) 3px,rgba(255,0,0,0.02) 6px);animation:scan 5s linear infinite reverse}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(100vh)}}

/* GLITCH EFFECT ON TEXT */
@keyframes glitch1{0%,100%{transform:translate(0)}2%{transform:translate(-2px,1px);opacity:0.8}4%{transform:translate(2px,-1px);opacity:0.6}6%{transform:translate(0)}8%{transform:translate(-1px,2px)}10%{transform:translate(0)}}
@keyframes glitch2{0%,100%{transform:translate(0)}3%{transform:translate(3px,-1px);opacity:0.7}5%{transform:translate(-3px,2px);opacity:0.5}7%{transform:translate(0)}9%{transform:translate(1px,-2px)}11%{transform:translate(0)}}
@keyframes flick{0%,100%{opacity:1}5%{opacity:0}10%{opacity:1}15%{opacity:0.3}20%{opacity:1}}

/* MAIN PAGE - TITLE ONLY */
.main-page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;background:radial-gradient(ellipse at center,rgba(180,0,0,0.02),transparent 70%)}
.main-page h1{font-family:'Black Ops One',cursive;font-size:5rem;letter-spacing:6px;text-transform:uppercase;text-align:center;line-height:1;background:linear-gradient(180deg,#e8e4dc 20%,#b40000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch1 3s ease-in-out infinite;position:relative}
.main-page h1::before{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#e8e4dc 20%,#b40000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch2 4s ease-in-out infinite;opacity:0.3;clip-path:inset(20% 0 60% 0)}
.main-page h1::after{content:'YOKAIS DIVISION KOPION';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#e8e4dc 20%,#b40000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch1 2.5s ease-in-out infinite reverse;opacity:0.3;clip-path:inset(60% 0 20% 0)}
.main-page .sub{font-size:0.55rem;color:rgba(180,0,0,0.15);letter-spacing:8px;text-transform:uppercase;margin-top:20px;animation:flick 2s infinite}

/* FANGS SVG DECORATION */
.fangs{position:absolute;display:flex;gap:40px;margin-top:40px}
.fang-svg{width:30px;height:40px;opacity:0.06;fill:none;stroke:rgba(180,0,0,0.3);stroke-width:2}

/* MENU */
.menu{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:10;height:56px}
.menu button{flex:1;border:none;font-family:'Black Ops One',cursive;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border-top:1px solid rgba(255,255,255,0.02)}
.menu button:nth-child(1){background:rgba(0,0,0,0.95);color:rgba(74,222,128,0.4);border-top-color:rgba(74,222,128,0.05)}
.menu button:nth-child(1):hover,.menu button:nth-child(1).on{color:#4ade80;background:rgba(74,222,128,0.02);border-top-color:#4ade80}
.menu button:nth-child(2){background:rgba(0,0,0,0.95);color:rgba(212,168,76,0.4);border-top-color:rgba(212,168,76,0.05)}
.menu button:nth-child(2):hover,.menu button:nth-child(2).on{color:#d4a84c;background:rgba(212,168,76,0.02);border-top-color:#d4a84c}
.menu button:nth-child(3){background:rgba(0,0,0,0.95);color:rgba(255,255,255,0.3);border-top-color:rgba(255,255,255,0.02)}
.menu button:nth-child(3):hover,.menu button:nth-child(3).on{color:#fff;background:rgba(255,255,255,0.01);border-top-color:#fff}

/* PANELS */
.panel{position:fixed;top:0;left:0;right:0;bottom:56px;z-index:5;overflow-y:auto;display:none;padding:20px}
.panel.on{display:block}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:rgba(180,0,0,0.1);border-radius:2px}

/* MINING PANEL - Green theme */
.panel.mining{background:#050508}
.panel.mining .h2{font-family:'Black Ops One',cursive;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;color:#4ade80;margin-bottom:12px}
.panel.mining .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px;margin-bottom:20px}
.panel.mining .card{background:rgba(74,222,128,0.01);border:1px solid rgba(74,222,128,0.03);border-radius:6px;padding:12px 14px;transition:all 0.3s}
.panel.mining .card:hover{background:rgba(74,222,128,0.02);border-color:rgba(74,222,128,0.06)}
.panel.mining .card h4{font-size:0.72rem;font-weight:600;margin-bottom:3px}
.panel.mining .card .m{font-size:0.45rem;color:rgba(74,222,128,0.1);letter-spacing:1px}
.panel.mining .card .v{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin:3px 0}
.panel.mining .card .v div{text-align:center;padding:2px;background:rgba(0,0,0,0.2);border-radius:2px}
.panel.mining .card .v .nv{font-size:0.55rem;font-weight:600}
.panel.mining .card .v .nv.h{color:#b40000}.nv.m{color:#4ade80}
.panel.mining .card .v .lb{font-size:0.4rem;color:rgba(74,222,128,0.05);text-transform:uppercase}
.panel.mining .card .loc{font-size:0.5rem;color:rgba(74,222,128,0.06);margin-top:3px;line-height:1.3}

/* MISSION PANEL - Gold theme */
.panel.mission{background:#050508}
.panel.mission .h2{font-family:'Black Ops One',cursive;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;color:#d4a84c;margin-bottom:12px}

/* BLUEPRINT PANEL - White theme */
.panel.blueprint{background:#050508}
.panel.blueprint .h2{font-family:'Black Ops One',cursive;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;color:#e8e4dc;margin-bottom:12px}

/* LOCATIONS sub-panel in mining */
.panel.mining .lc{background:rgba(74,222,128,0.01);border:1px solid rgba(74,222,128,0.02);border-radius:6px;padding:10px 14px;margin-bottom:4px}
.panel.mining .lc h4{font-size:0.65rem;font-weight:600}
.panel.mining .lc .meta{font-size:0.45rem;color:rgba(74,222,128,0.08);text-transform:uppercase;letter-spacing:1px}
.panel.mining .lc .mins{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.panel.mining .lc .mins span{font-size:0.45rem;padding:1px 5px;border-radius:2px;background:rgba(0,0,0,0.2);color:rgba(74,222,128,0.06)}

/* REFINERIES */
.panel.mining .rc{background:rgba(74,222,128,0.01);border:1px solid rgba(74,222,128,0.02);border-radius:6px;padding:10px 14px;margin-bottom:4px}
.panel.mining .rc h4{font-size:0.62rem;font-weight:600}
.panel.mining .rc .meta{font-size:0.45rem;color:rgba(74,222,128,0.06)}
.panel.mining .rc .bon{font-size:0.5rem;color:rgba(74,222,128,0.06);line-height:1.4;margin-top:2px}
.panel.mining .rc .bon em{color:rgba(74,222,128,0.2);font-style:normal}
.panel.mining .info{font-size:0.5rem;color:rgba(74,222,128,0.04);margin-bottom:8px;line-height:1.4}

/* GOLD MISSION PLACEHOLDER */
.panel.mission .placeholder{padding:40px 20px;text-align:center}
.panel.mission .placeholder p{font-size:0.7rem;color:rgba(212,168,76,0.04);letter-spacing:2px;text-transform:uppercase;font-family:'Black Ops One',cursive}

/* WHITE BLUEPRINT PLACEHOLDER */
.panel.blueprint .placeholder{padding:40px 20px;text-align:center}
.panel.blueprint .placeholder p{font-size:0.7rem;color:rgba(232,228,220,0.02);letter-spacing:2px;text-transform:uppercase;font-family:'Black Ops One',cursive}

/* SUB-MENU inside panels */
.submenu{display:flex;gap:2px;margin-bottom:12px}
.submenu button{font-size:0.5rem;padding:5px 12px;background:transparent;border:1px solid rgba(255,255,255,0.02);border-radius:3px;color:rgba(255,255,255,0.05);cursor:pointer;font-family:Inter,sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
.submenu button:hover{color:rgba(255,255,255,0.1)}
.submenu button.on{color:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.04)}

@media(max-width:600px){
  .main-page h1{font-size:2.8rem;letter-spacing:3px}
  .menu button{font-size:0.5rem;letter-spacing:2px}
  .panel.mining .cg{grid-template-columns:1fr}
}
</style>
</head>

function fmt(n){if(!n&&n!==0)return'—';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function cl(v){if(v>500)return'h';if(v>100)return'm';return'l'}
function gm(n){var f=['Hadanite','Dolivine','Aphorite','Janalite','Jaclium','Saldynium','Carinite','Carinitepure'];var r=['Glacosite','Beradom','Feynmaline'];if(f.indexOf(n)!==-1)return'FPS';if(r.indexOf(n)!==-1)return'ROC';return'SHIP'}

function gl(n){
  var r=[];
  for(var k in DATA.locations){
    var loc=DATA.locations[k];
    for(var i=0;i<loc.m.length;i++){if(loc.m[i].toLowerCase().indexOf(n.toLowerCase())!==-1){r.push(k);break}}
  }
  return r.length?'<span style="color:rgba(74,222,128,0.06)">' + r.slice(0,3).join(', ') + (r.length>3?', +'+(r.length-3)+' mas':''):'<span style="color:rgba(74,222,128,0.04)">Sin ubicacion fija';
}

function rm(){
  var g=document.getElementById('mineralGrid');
  g.innerHTML='';
  var e=DATA.elements;
  for(var k in e){
    var v=e[k];var m=gm(k);
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<h4>'+k+' <span style="font-size:0.45rem;color:rgba(74,222,128,0.15);letter-spacing:1px">'+m+'</span></h4>'+
      '<div class="v"><div><div class="nv '+cl(v.i)+'">'+fmt(v.i)+'</div><div class="lb">Inestab</div></div>'+
      '<div><div class="nv">'+fmt(v.d)+'</div><div class="lb">Densidad</div></div>'+
      '<div><div class="nv '+cl(v.e)+'">'+fmt(v.e)+'</div><div class="lb">Explosion</div></div></div>'+
      '<div class="loc">'+gl(k)+'</div>';
    g.appendChild(d);
  }
}

function rl(){
  var g=document.getElementById('locGrid');
  g.innerHTML='';
  for(var k in DATA.locations){
    var loc=DATA.locations[k];
    var d=document.createElement('div');d.className='lc';
    d.innerHTML='<h4>'+k+'</h4><div class="meta">'+loc.s+' vs '+loc.t+'</div>'+
      '<div class="mins">'+loc.m.map(function(x){return'<span>'+x+'</span>'}).join('')+'</div>';
    g.appendChild(d);
  }
}

function rr(){
  var g=document.getElementById('refGrid');
  g.innerHTML='';
  var r=DATA.refineries;
  for(var i=0;i<r.length;i++){
    var rf=r[i];
    var d=document.createElement('div');d.className='rc';
    var b=Object.keys(rf.b).sort(function(a,b){return rf.b[b]-rf.b[a]}).slice(0,10);
    d.innerHTML='<h4>'+rf.n+'</h4><div class="meta">'+rf.s+'</div>'+
      '<div class="bon">'+b.map(function(k){var v=rf.b[k];return '<em>'+(v>0?'+':'')+v+'%</em> '+k.replace(' (Ore)','').replace(' (Raw)','')}).join(' ')+'</div>';
    g.appendChild(d);
  }
}

function openPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.menu button').forEach(function(b){b.classList.remove('on')});
  document.getElementById('panel-'+id).classList.add('on');
  event.target.classList.add('on');
}

function showSub(id,btn){
  document.querySelectorAll('#panel-mining .submenu button').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.getElementById('minerales-view').style.display=id==='minerales'?'block':'none';
  document.getElementById('ubicaciones-view').style.display=id==='ubicaciones'?'block':'none';
  document.getElementById('refinerias-view').style.display=id==='refinerias'?'block':'none';
}
